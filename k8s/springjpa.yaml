apiVersion: apps/v1
kind: Deployment
metadata:
  name: springjpa
  namespace: spring-practice
  labels:
    app: springjpa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springjpa
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: springjpa
    spec:
      containers:
      - name: springjpa
        image: robertp22/springjpa:0.0.1
        #imagePullPolicy: Always
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1"
        securityContext:
          allowPrivilegeEscalation: false
          #runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 2
        env:
          - name: SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS
            value: kcluster-kafka-bootstrap.kafka.svc.cluster.local:9092
          - name: SPRING_KAFKA_PRODUCER_PROPERTIES_SCHEMA_REGISTRY_URL
            value: http://schema-registry.kafka.svc.cluster.local:8081
          - name: SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS
            value: kcluster-kafka-bootstrap.kafka.svc.cluster.local:9092
          - name: SPRING_KAFKA_CONSUMER_PROPERTIES_SCHEMA_REGISTRY_URL
            value: http://schema-registry.kafka.svc.cluster.local:8081
        
---
apiVersion: v1
kind: Service
metadata:
  name: springjpa
  namespace: spring-practice
spec:
  selector:
    app: springjpa
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
  